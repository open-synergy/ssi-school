            type: "value"
            expected: "open"

      - step: "Get first payment term (sequence 10)"
        action: "search"
        model: "school_enrollment_payment_term"
        domain:
          - ["enrollment_id", "=", "EVAL: registry['enrollment'].id"]
          - ["sequence", "=", 10]
        save_as: "term_1"
        expect_count: 1

      - step: "Mark first term as manual"
        action: "call"
        target: "term_1"
        method: "action_mark_as_manual"
        asserts:
          state:
            type: "value"
            expected: "manual"

      - step: "Get second payment term (sequence 20)"
        action: "search"
        model: "school_enrollment_payment_term"
        domain:
          - ["enrollment_id", "=", "EVAL: registry['enrollment'].id"]
          - ["sequence", "=", 20]
        save_as: "term_2"
        expect_count: 1

      - step: "Create invoice for second term only"
        action: "call"
        target: "term_2"
        method: "action_create_invoice"

      - step: "Invalidate term_2 cache"
        action: "call"
        target: "term_2"
        method: "invalidate_cache"

      - step: "Assert second term has invoice"
        action: "assert"
        target: "term_2"
        asserts:
          invoice_id:
            type: "value"
            operator: "is_truthy"

      - step: "Assert first term has no invoice"
        action: "assert"
        target: "term_1"
        asserts:
          invoice_id:
            type: "value"
            operator: "is_falsy"

      - step: "Assert enrollment done"
        action: "call"
        target: "enrollment"
        method: "action_done"
        asserts:
          state:
            type: "value"
            expected: "done"

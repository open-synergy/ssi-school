scenarios:
  - name: "Create Payment Template"
    steps:
      - step: "Create grade type"
        action: "create"
        model: "school_grade_type"
        save_as: "grade_type"
        values:
          name: "Grade Type PMT Create"
          code: "GTPMTCR"
          sequence: 10
      - step: "Create school"
        action: "create"
        model: "school"
        save_as: "school"
        values:
          name: "School PMT Create"
          code: "SCHPMTCR"
          grade_type_id: "EVAL: registry['grade_type'].id"
      - step: "Create grade"
        action: "create"
        model: "school_grade"
        save_as: "grade"
        values:
          name: "Grade PMT Create"
          code: "GPMTCR"
          sequence: 10
          type_id: "EVAL: registry['grade_type'].id"
      - step: "Create payment template"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "New Payment Template"
          code: "PMT002"
          school_id: "EVAL: registry['school'].id"
          grade_id: "EVAL: registry['grade'].id"
      - step: "Assert created"
        action: "assert"
        target: "template"
        asserts:
          id:
            type: "value"
            operator: "is_truthy"
          name:
            type: "value"
            expected: "New Payment Template"
          school_id:
            type: "value"
            operator: "is_truthy"
          grade_id:
            type: "value"
            operator: "is_truthy"

  - name: "Create Payment Template Without School And Grade"
    steps:
      - step: "Create payment template without school and grade"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Generic Payment Template"
          code: "PMT003"
      - step: "Assert created with falsy school and grade"
        action: "assert"
        target: "template"
        asserts:
          id:
            type: "value"
            operator: "is_truthy"
          school_id:
            type: "value"
            operator: "is_falsy"
          grade_id:
            type: "value"
            operator: "is_falsy"

  - name: "Create Payment Template With Term Lines"
    steps:
      - step: "Create grade type"
        action: "create"
        model: "school_grade_type"
        save_as: "grade_type"
        values:
          name: "Grade Type PMT Terms"
          code: "GTPMTTR"
          sequence: 10
      - step: "Create school"
        action: "create"
        model: "school"
        save_as: "school"
        values:
          name: "School PMT Terms"
          code: "SCHPMTTR"
          grade_type_id: "EVAL: registry['grade_type'].id"
      - step: "Create payment template with term_ids"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template With Terms"
          code: "PMTWT"
          school_id: "EVAL: registry['school'].id"
          term_ids:
            - [0, 0, {name: "Term 1", sequence: 10}]
      - step: "Assert template has one term"
        action: "assert"
        target: "template"
        asserts:
          term_ids:
            type: "o2m"
            check: "count"
            expected_count: 1

  - name: "Edit Payment Template Name"
    steps:
      - step: "Create payment template"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Payment Template Test Edit"
          code: "PMTED"
      - step: "Write new name"
        action: "write"
        target: "template"
        values:
          name: "Updated Payment Template"
      - step: "Assert name updated"
        action: "assert"
        target: "template"
        asserts:
          name:
            type: "value"
            expected: "Updated Payment Template"

  - name: "Edit Payment Template Academic Term"
    steps:
      - step: "Create academic year"
        action: "create"
        model: "school_academic_year"
        save_as: "year"
        values:
          name: "2024/2025 PMT Term Edit"
          code: "AYPMT"
          date_start: "2024-07-01"
          date_end: "2025-06-30"
      - step: "Create first academic term"
        action: "create"
        model: "school_academic_term"
        save_as: "term"
        values:
          name: "Semester 1 PMT"
          code: "SMPMT"
          date_start: "2024-07-01"
          date_end: "2024-12-31"
          year_id: "EVAL: registry['year'].id"
      - step: "Create second academic term"
        action: "create"
        model: "school_academic_term"
        save_as: "new_term"
        values:
          name: "Semester 2 PMT"
          code: "SM2PMT"
          date_start: "2025-01-01"
          date_end: "2025-06-30"
          year_id: "EVAL: registry['year'].id"
      - step: "Create payment template"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template Term Edit"
          code: "PMTTE"
          academic_term_id: "EVAL: registry['term'].id"
      - step: "Update academic term"
        action: "write"
        target: "template"
        values:
          academic_term_id: "EVAL: registry['new_term'].id"
      - step: "Verify term was updated"
        action: "search"
        model: "school_enrollment_payment_template"
        domain:
          [
            ["id", "=", "EVAL: registry['template'].id"],
            ["academic_term_id", "=", "EVAL: registry['new_term'].id"],
          ]
        save_as: "_check"
        expect_count: 1

  - name: "Edit Payment Template Add Term Line"
    steps:
      - step: "Create payment template"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template Add Term"
          code: "PMTAT"
      - step: "Add a term line"
        action: "write"
        target: "template"
        values:
          term_ids:
            - [0, 0, {name: "Added Term", sequence: 20}]
      - step: "Assert term was added"
        action: "assert"
        target: "template"
        asserts:
          term_ids:
            type: "o2m"
            check: "count"
            expected_count: 1

  - name: "Delete Payment Template"
    steps:
      - step: "Create payment template"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template To Delete"
          code: "PMTDEL"
      - step: "Delete template"
        action: "call"
        target: "template"
        method: "unlink"
      - step: "Search expects zero results"
        action: "search"
        model: "school_enrollment_payment_template"
        domain: [["code", "=", "PMTDEL"]]
        save_as: "result"
        expect_count: 0

  - name: "Delete Payment Template Cascades Terms"
    steps:
      - step: "Create payment template with terms"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template Cascade Delete"
          code: "PMTCSC"
          term_ids:
            - [0, 0, {name: "Cascade Term", sequence: 10}]
      - step: "Delete template"
        action: "call"
        target: "template"
        method: "unlink"
      - step: "Search template expects zero results"
        action: "search"
        model: "school_enrollment_payment_template"
        domain: [["code", "=", "PMTCSC"]]
        save_as: "result"
        expect_count: 0

  - name: "Compute Grade Type From School"
    steps:
      - step: "Create grade type"
        action: "create"
        model: "school_grade_type"
        save_as: "grade_type"
        values:
          name: "Grade Type PMT Compute"
          code: "GTPMTCO"
          sequence: 10
      - step: "Create school"
        action: "create"
        model: "school"
        save_as: "school"
        values:
          name: "School PMT Compute"
          code: "SCHPMTCO"
          grade_type_id: "EVAL: registry['grade_type'].id"
      - step: "Create payment template"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template Grade Type Compute"
          code: "PMTGTC"
          school_id: "EVAL: registry['school'].id"
      - step: "Assert grade_type_id from school"
        action: "assert"
        target: "template"
        asserts:
          grade_type_id:
            type: "value"
            operator: "is_truthy"

  - name: "Compute Grade Type Empty When No School"
    steps:
      - step: "Create payment template without school"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template No School"
          code: "PMTNS"
      - step: "Assert grade_type_id is falsy"
        action: "assert"
        target: "template"
        asserts:
          grade_type_id:
            type: "value"
            operator: "is_falsy"

  - name: "Create Term"
    steps:
      - step: "Create payment template"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template for Term Test"
          code: "PMTTRM"
      - step: "Create term"
        action: "create"
        model: "school_enrollment_payment_template.term"
        save_as: "term"
        values:
          name: "Term B"
          sequence: 20
          template_id: "EVAL: registry['template'].id"
      - step: "Assert term created"
        action: "assert"
        target: "term"
        asserts:
          id:
            type: "value"
            operator: "is_truthy"
          name:
            type: "value"
            expected: "Term B"
          template_id:
            type: "value"
            operator: "is_truthy"

  - name: "Edit Term Name"
    steps:
      - step: "Create payment template"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template Term Edit Name"
          code: "PMTTEN"
      - step: "Create term"
        action: "create"
        model: "school_enrollment_payment_template.term"
        save_as: "term"
        values:
          name: "Term A"
          sequence: 10
          template_id: "EVAL: registry['template'].id"
      - step: "Write new name"
        action: "write"
        target: "term"
        values:
          name: "Term A Updated"
      - step: "Assert name updated"
        action: "assert"
        target: "term"
        asserts:
          name:
            type: "value"
            expected: "Term A Updated"

  - name: "Edit Term Sequence"
    steps:
      - step: "Create payment template"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template Term Edit Seq"
          code: "PMTTESEQ"
      - step: "Create term"
        action: "create"
        model: "school_enrollment_payment_template.term"
        save_as: "term"
        values:
          name: "Term Seq"
          sequence: 10
          template_id: "EVAL: registry['template'].id"
      - step: "Update sequence"
        action: "write"
        target: "term"
        values:
          sequence: 99
      - step: "Assert sequence updated"
        action: "assert"
        target: "term"
        asserts:
          sequence:
            type: "value"
            expected: 99

  - name: "Delete Term"
    steps:
      - step: "Create payment template"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template Term Delete"
          code: "PMTTDEL"
      - step: "Create term"
        action: "create"
        model: "school_enrollment_payment_template.term"
        save_as: "term"
        values:
          name: "Term To Delete"
          sequence: 50
          template_id: "EVAL: registry['template'].id"
      - step: "Delete term"
        action: "call"
        target: "term"
        method: "unlink"
      - step: "Assert template has no terms"
        action: "assert"
        target: "template"
        asserts:
          term_ids:
            type: "o2m"
            check: "count"
            expected_count: 0

  - name: "Create Term Detail"
    steps:
      - step: "Create account type ref"
        action: "ref"
        xml_id: "account.data_account_type_revenue"
        save_as: "account_type"
      - step: "Create account"
        action: "create"
        model: "account.account"
        save_as: "account"
        values:
          name: "Test Income Account Detail"
          code: "TEST4101"
          user_type_id: "EVAL: registry['account_type'].id"
      - step: "Create product"
        action: "create"
        model: "product.product"
        save_as: "product"
        values:
          name: "Another Fee Product"
          type: "service"
          list_price: 200000.0
      - step: "Create payment template"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template for Detail Create"
          code: "PMTDETCR"
      - step: "Create term"
        action: "create"
        model: "school_enrollment_payment_template.term"
        save_as: "term"
        values:
          name: "Term for Detail"
          sequence: 10
          template_id: "EVAL: registry['template'].id"
      - step: "Create term detail"
        action: "create"
        model: "school_enrollment_payment_template.term.detail"
        save_as: "detail"
        values:
          term_id: "EVAL: registry['term'].id"
          sequence: 20
          product_id: "EVAL: registry['product'].id"
          name: "Registration Fee"
          account_id: "EVAL: registry['account'].id"
          uom_quantity: 1.0
          price_unit: 200000.0
      - step: "Assert detail created"
        action: "assert"
        target: "detail"
        asserts:
          id:
            type: "value"
            operator: "is_truthy"
          name:
            type: "value"
            expected: "Registration Fee"
          price_unit:
            type: "value"
            expected: 200000.0

  - name: "Edit Term Detail Name"
    steps:
      - step: "Create account type ref"
        action: "ref"
        xml_id: "account.data_account_type_revenue"
        save_as: "account_type"
      - step: "Create account"
        action: "create"
        model: "account.account"
        save_as: "account"
        values:
          name: "Test Income Account Detail Edit"
          code: "TEST4102"
          user_type_id: "EVAL: registry['account_type'].id"
      - step: "Create product"
        action: "create"
        model: "product.product"
        save_as: "product"
        values:
          name: "Fee Product Edit"
          type: "service"
      - step: "Create payment template"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template Detail Edit Name"
          code: "PMTDETEN"
      - step: "Create term"
        action: "create"
        model: "school_enrollment_payment_template.term"
        save_as: "term"
        values:
          name: "Term Detail Edit"
          sequence: 10
          template_id: "EVAL: registry['template'].id"
      - step: "Create term detail"
        action: "create"
        model: "school_enrollment_payment_template.term.detail"
        save_as: "detail"
        values:
          term_id: "EVAL: registry['term'].id"
          sequence: 10
          product_id: "EVAL: registry['product'].id"
          name: "School Fee"
          account_id: "EVAL: registry['account'].id"
          uom_quantity: 1.0
          price_unit: 500000.0
      - step: "Write new name"
        action: "write"
        target: "detail"
        values:
          name: "Updated Fee Name"
      - step: "Assert name updated"
        action: "assert"
        target: "detail"
        asserts:
          name:
            type: "value"
            expected: "Updated Fee Name"

  - name: "Edit Term Detail Price"
    steps:
      - step: "Create account type ref"
        action: "ref"
        xml_id: "account.data_account_type_revenue"
        save_as: "account_type"
      - step: "Create account"
        action: "create"
        model: "account.account"
        save_as: "account"
        values:
          name: "Test Income Account Detail Price"
          code: "TEST4103"
          user_type_id: "EVAL: registry['account_type'].id"
      - step: "Create product"
        action: "create"
        model: "product.product"
        save_as: "product"
        values:
          name: "Fee Product Price Edit"
          type: "service"
      - step: "Create payment template"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template Detail Price Edit"
          code: "PMTDETPE"
      - step: "Create term"
        action: "create"
        model: "school_enrollment_payment_template.term"
        save_as: "term"
        values:
          name: "Term Price Edit"
          sequence: 10
          template_id: "EVAL: registry['template'].id"
      - step: "Create term detail"
        action: "create"
        model: "school_enrollment_payment_template.term.detail"
        save_as: "detail"
        values:
          term_id: "EVAL: registry['term'].id"
          sequence: 10
          product_id: "EVAL: registry['product'].id"
          name: "Fee Price Edit"
          account_id: "EVAL: registry['account'].id"
          uom_quantity: 1.0
          price_unit: 500000.0
      - step: "Update price"
        action: "write"
        target: "detail"
        values:
          price_unit: 750000.0
      - step: "Assert price updated"
        action: "assert"
        target: "detail"
        asserts:
          price_unit:
            type: "value"
            expected: 750000.0

  - name: "Delete Term Detail"
    steps:
      - step: "Create account type ref"
        action: "ref"
        xml_id: "account.data_account_type_revenue"
        save_as: "account_type"
      - step: "Create account"
        action: "create"
        model: "account.account"
        save_as: "account"
        values:
          name: "Test Income Account Detail Del"
          code: "TEST4104"
          user_type_id: "EVAL: registry['account_type'].id"
      - step: "Create product"
        action: "create"
        model: "product.product"
        save_as: "product"
        values:
          name: "Fee To Delete"
          type: "service"
      - step: "Create payment template"
        action: "create"
        model: "school_enrollment_payment_template"
        save_as: "template"
        values:
          name: "Template Detail Delete"
          code: "PMTDETDEL"
      - step: "Create term"
        action: "create"
        model: "school_enrollment_payment_template.term"
        save_as: "term"
        values:
          name: "Term Detail Delete"
          sequence: 10
          template_id: "EVAL: registry['template'].id"
      - step: "Create term detail"
        action: "create"
        model: "school_enrollment_payment_template.term.detail"
        save_as: "detail"
        values:
          term_id: "EVAL: registry['term'].id"
          sequence: 99
          product_id: "EVAL: registry['product'].id"
          name: "Fee To Delete"
          account_id: "EVAL: registry['account'].id"
          uom_quantity: 1.0
          price_unit: 100000.0
      - step: "Delete detail"
        action: "call"
        target: "detail"
        method: "unlink"
      - step: "Assert term has no details"
        action: "assert"
        target: "term"
        asserts:
          detail_ids:
            type: "o2m"
            check: "count"
            expected_count: 0

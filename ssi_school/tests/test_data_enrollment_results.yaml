scenarios:
  - name: "Enrollment Result - Passed"
    steps:
      - step: "Setup - create grade type"
        action: "create"
        model: "school_grade_type"
        save_as: "grade_type"
        values:
          name: "Grade Type Enrollment Result Passed"
          code: "GTERP"
          sequence: 10

      - step: "Setup - create academic year"
        action: "create"
        model: "school_academic_year"
        save_as: "academic_year"
        values:
          name: "2024/2025 Enrollment Result Passed"
          code: "AYERP"
          date_start: "2024-07-01"
          date_end: "2025-06-30"

      - step: "Setup - create academic term"
        action: "create"
        model: "school_academic_term"
        save_as: "academic_term"
        values:
          name: "Semester Enrollment Result Passed"
          code: "SMERP"
          date_start: "2024-07-01"
          date_end: "2025-06-30"
          year_id: "EVAL: registry['academic_year'].id"
          enrollment_state: "open"

      - step: "Setup - create school"
        action: "create"
        model: "school"
        save_as: "school"
        values:
          name: "School Enrollment Result Passed"
          code: "SCHERP"
          grade_type_id: "EVAL: registry['grade_type'].id"

      - step: "Setup - create grade 1"
        action: "create"
        model: "school_grade"
        save_as: "grade"
        values:
          name: "Grade 1 Enrollment Result Passed"
          code: "G1ERP"
          sequence: 10
          type_id: "EVAL: registry['grade_type'].id"

      - step: "Setup - create grade 2 (next grade for promotion)"
        action: "create"
        model: "school_grade"
        save_as: "grade_next"
        values:
          name: "Grade 2 Enrollment Result Passed"
          code: "G2ERP"
          sequence: 20
          type_id: "EVAL: registry['grade_type'].id"

      - step: "Setup - create grade class"
        action: "create"
        model: "school_grade_class"
        save_as: "grade_class"
        values:
          name: "Class A Enrollment Result Passed"
          code: "CLAERP"
          school_id: "EVAL: registry['school'].id"
          grade_id: "EVAL: registry['grade'].id"

      - step: "Setup - create student contact"
        action: "create"
        model: "res.partner"
        save_as: "contact"
        values:
          name: "Student Contact Enrollment Result Passed"

      - step: "Setup - create student"
        action: "create"
        model: "school_student"
        save_as: "student"
        values:
          name: "Student Enrollment Result Passed"
          code: "STUERP"
          contact_id: "EVAL: registry['contact'].id"
          school_id: "EVAL: registry['school'].id"

      - step: "Create enrollment without payment template"
        action: "create"
        model: "school_enrollment"
        save_as: "enrollment"
        values:
          date: "2024-07-01"
          academic_year_id: "EVAL: registry['academic_year'].id"
          academic_term_id: "EVAL: registry['academic_term'].id"
          school_id: "EVAL: registry['school'].id"
          grade_id: "EVAL: registry['grade'].id"
          grade_class_id: "EVAL: registry['grade_class'].id"
          student_id: "EVAL: registry['student'].id"
          currency_id: "EVAL: env.company.currency_id.id"

      - step: "Confirm enrollment"
        action: "call"
        target: "enrollment"
        method: "action_confirm"
        as_user: "base.user_admin"
        asserts:
          state:
            type: "value"
            expected: "confirm"

      - step: "Invalidate enrollment cache before approve"
        action: "call"
        target: "enrollment"
        method: "invalidate_cache"

      - step: "Approve enrollment"
        action: "call"
        target: "enrollment"
        method: "action_approve_approval"
        as_user: "base.user_admin"
        asserts:
          state:
            type: "value"
            expected: "open"

      - step: "Invalidate enrollment cache after approve"
        action: "call"
        target: "enrollment"
        method: "invalidate_cache"

      - step: "Set result to passed"
        action: "call"
        target: "enrollment"
        method: "action_set_result_to_passed"
        as_user: "base.user_admin"

      - step: "Invalidate enrollment cache after result"
        action: "call"
        target: "enrollment"
        method: "invalidate_cache"

      - step: "Assert enrollment is done with passed result"
        action: "assert"
        target: "enrollment"
        asserts:
          state:
            type: "value"
            expected: "done"
          academic_year_result:
            type: "value"
            expected: "passed"
          promote_to_grade_id:
            type: "value"
            operator: "is_truthy"

      - step: "Invalidate student cache after result"
        action: "call"
        target: "student"
        method: "invalidate_cache"

      - step: "Assert student state returned to draft after passed"
        action: "assert"
        target: "student"
        asserts:
          state:
            type: "value"
            expected: "draft"


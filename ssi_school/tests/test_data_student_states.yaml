scenarios:
  - name: "Student State - On Leave"
    steps:
      - step: "Setup - create grade type"
        action: "create"
        model: "school_grade_type"
        save_as: "grade_type"
        values:
          name: "Grade Type Student On Leave"
          code: "GTSOL"
          sequence: 10

      - step: "Setup - create school"
        action: "create"
        model: "school"
        save_as: "school"
        values:
          name: "School Student On Leave"
          code: "SCHSOL"
          grade_type_id: "EVAL: registry['grade_type'].id"

      - step: "Setup - create grade"
        action: "create"
        model: "school_grade"
        save_as: "grade"
        values:
          name: "Grade Student On Leave"
          code: "GSOL"
          sequence: 10
          type_id: "EVAL: registry['grade_type'].id"

      - step: "Setup - create student contact"
        action: "create"
        model: "res.partner"
        save_as: "contact"
        values:
          name: "Student Contact On Leave"

      - step: "Create student"
        action: "create"
        model: "school_student"
        save_as: "student"
        values:
          name: "Student On Leave"
          code: "STUOL"
          contact_id: "EVAL: registry['contact'].id"
          school_id: "EVAL: registry['school'].id"
          initial_grade_id: "EVAL: registry['grade'].id"

      - step: "Set student to on leave"
        action: "call"
        target: "student"
        method: "action_set_to_on_leave"

      - step: "Invalidate student cache"
        action: "call"
        target: "student"
        method: "invalidate_cache"

      - step: "Assert student state is on_leave"
        action: "assert"
        target: "student"
        asserts:
          state:
            type: "value"
            expected: "on_leave"


scenarios:
  - name: "School Lead - Create school with default sales team"
    steps:
      - step: "Create sales team"
        action: "create"
        model: "crm.team"
        save_as: "sales_team"
        values:
          name: "School Sales Team SL"

      - step: "Create grade type"
        action: "create"
        model: "school_grade_type"
        save_as: "grade_type"
        values:
          name: "Grade Type School Lead"
          code: "GTSL"
          sequence: 10

      - step: "Create school with default sales team"
        action: "create"
        model: "school"
        save_as: "school"
        values:
          name: "School With Sales Team SL"
          code: "SCHSL01"
          grade_type_id: "EVAL: registry['grade_type'].id"
          default_sales_team_id: "EVAL: registry['sales_team'].id"

      - step: "Assert school has default sales team"
        action: "assert"
        target: "school"
        asserts:
          default_sales_team_id:
            type: "value"
            operator: "is_truthy"
          name:
            type: "value"
            expected: "School With Sales Team SL"

  - name: "School Lead - Create CRM lead with school and student"
    steps:
      - step: "Create grade type"
        action: "create"
        model: "school_grade_type"
        save_as: "grade_type"
        values:
          name: "Grade Type CRM Lead SL"
          code: "GTCRMLSL"
          sequence: 10

      - step: "Create school"
        action: "create"
        model: "school"
        save_as: "school"
        values:
          name: "School CRM Lead SL"
          code: "SCHSL02"
          grade_type_id: "EVAL: registry['grade_type'].id"

      - step: "Create student partner"
        action: "create"
        model: "res.partner"
        save_as: "student"
        values:
          name: "Student CRM Lead SL"

      - step: "Create CRM lead with school and student"
        action: "create"
        model: "crm.lead"
        save_as: "lead"
        as_user: "base.user_admin"
        values:
          name: "CRM Lead with School SL"
          school_id: "EVAL: registry['school'].id"
          student_id: "EVAL: registry['student'].id"

      - step: "Assert lead has school and student"
        action: "assert"
        target: "lead"
        asserts:
          school_id:
            type: "value"
            operator: "is_truthy"
          student_id:
            type: "value"
            operator: "is_truthy"

  - name: "School Lead - Create CRM lead without school (optional fields)"
    steps:
      - step: "Create CRM lead without school"
        action: "create"
        model: "crm.lead"
        save_as: "lead"
        as_user: "base.user_admin"
        values:
          name: "CRM Lead Without School SL"

      - step: "Assert lead created without school"
        action: "assert"
        target: "lead"
        asserts:
          school_id:
            type: "value"
            operator: "is_falsy"
          student_id:
            type: "value"
            operator: "is_falsy"

  - name: "School Lead - Create Admission via Wizard"
    steps:
      - step: "Create grade type"
        action: "create"
        model: "school_grade_type"
        save_as: "grade_type"
        values:
          name: "Grade Type Admission SL"
          code: "GTADMSL"
          sequence: 10

      - step: "Create academic year"
        action: "create"
        model: "school_academic_year"
        save_as: "academic_year"
        values:
          name: "2024/2025 Admission SL"
          code: "AYADMSL"
          date_start: "2024-07-01"
          date_end: "2025-06-30"

      - step: "Create academic term"
        action: "create"
        model: "school_academic_term"
        save_as: "academic_term"
        values:
          name: "Semester Admission SL"
          code: "SMADMSL"
          date_start: "2024-07-01"
          date_end: "2025-06-30"
          year_id: "EVAL: registry['academic_year'].id"
          enrollment_state: "open"

      - step: "Create school"
        action: "create"
        model: "school"
        save_as: "school"
        values:
          name: "School Admission SL"
          code: "SCHADMSL"
          grade_type_id: "EVAL: registry['grade_type'].id"

      - step: "Create grade"
        action: "create"
        model: "school_grade"
        save_as: "grade"
        values:
          name: "Grade Admission SL"
          code: "GADMSL"
          sequence: 10
          type_id: "EVAL: registry['grade_type'].id"

      - step: "Create student contact"
        action: "create"
        model: "res.partner"
        save_as: "student"
        values:
          name: "Student Admission SL"

      - step: "Create CRM lead"
        action: "create"
        model: "crm.lead"
        save_as: "lead"
        as_user: "base.user_admin"
        values:
          name: "Lead Admission SL"
          school_id: "EVAL: registry['school'].id"
          student_id: "EVAL: registry['student'].id"

      - step: "Assert lead has no admission yet"
        action: "assert"
        target: "lead"
        asserts:
          admission_id:
            type: "value"
            operator: "is_falsy"
          create_admission_ok:
            type: "value"
            expected: true

      - step: "Create wizard to create admission"
        action: "create"
        model: "crm.lead.create_admission"
        save_as: "wizard"
        values:
          lead_id: "EVAL: registry['lead'].id"
          date: "2024-07-01"
          academic_year_id: "EVAL: registry['academic_year'].id"
          academic_term_id: "EVAL: registry['academic_term'].id"
          school_id: "EVAL: registry['school'].id"
          grade_id: "EVAL: registry['grade'].id"
          student_id: "EVAL: registry['student'].id"

      - step: "Confirm wizard to create admission"
        action: "call"
        target: "wizard"
        method: "action_confirm"
        as_user: "base.user_admin"

      - step: "Invalidate lead cache"
        action: "call"
        target: "lead"
        method: "invalidate_cache"

      - step: "Assert admission created and linked to lead"
        action: "assert"
        target: "lead"
        asserts:
          admission_id:
            type: "value"
            operator: "is_truthy"
          create_admission_ok:
            type: "value"
            expected: false

      - step: "Call action_create_admission on lead (admission already exists)"
        action: "call"
        target: "lead"
        method: "action_create_admission"
        as_user: "base.user_admin"

  - name: "School Lead - Create Admission via Wizard with Payment Template and Compute"
    steps:
      - step: "Setup - get account type ref"
        action: "ref"
        xml_id: "account.data_account_type_revenue"
        save_as: "account_type"

      - step: "Setup - create income account"
        action: "create"
        model: "account.account"
        save_as: "account"
        values:
          name: "Admission Fee Income SLPT"
          code: "SLPT4200"
          user_type_id: "EVAL: registry['account_type'].id"

      - step: "Setup - create product"
        action: "create"
        model: "product.product"
        save_as: "product"
        values:
          name: "Registration Fee SLPT"
          type: "service"

      - step: "Create grade type"
        action: "create"
        model: "school_grade_type"
        save_as: "grade_type"
        values:
          name: "Grade Type SLPT"
          code: "GTSLPT"
          sequence: 10

      - step: "Create academic year"
        action: "create"
        model: "school_academic_year"
        save_as: "academic_year"
        values:
          name: "2025/2026 SLPT"
          code: "AYSLPT"
          date_start: "2025-07-01"
          date_end: "2026-06-30"

      - step: "Create academic term with is_open_admission"
        action: "create"
        model: "school_academic_term"
        save_as: "academic_term"
        values:
          name: "Semester SLPT"
          code: "SMSLPT"
          date_start: "2025-07-01"
          date_end: "2026-06-30"
          year_id: "EVAL: registry['academic_year'].id"
          is_open_admission: true

      - step: "Create school"
        action: "create"
        model: "school"
        save_as: "school"
        values:
          name: "School SLPT"
          code: "SCHSLPT"
          grade_type_id: "EVAL: registry['grade_type'].id"

      - step: "Create grade"
        action: "create"
        model: "school_grade"
        save_as: "grade"
        values:
          name: "Grade SLPT"
          code: "GSLPT"
          sequence: 10
          type_id: "EVAL: registry['grade_type'].id"

      - step: "Create payment template with term and detail"
        action: "create"
        model: "school_admission_payment_template"
        save_as: "payment_template"
        values:
          name: "Payment Template SLPT"
          code: "PTSLPT"
          school_id: "EVAL: registry['school'].id"
          grade_id: "EVAL: registry['grade'].id"
          academic_term_id: "EVAL: registry['academic_term'].id"
          term_ids:
            - - 0
              - 0
              - name: "Term 1 SLPT"
                sequence: 5
                detail_ids:
                  - - 0
                    - 0
                    - product_id: "EVAL: registry['product'].id"
                      name: "Registration Fee SLPT"
                      account_id: "EVAL: registry['account'].id"
                      uom_quantity: 1.0
                      price_unit: 500000.0

      - step: "Create student contact"
        action: "create"
        model: "res.partner"
        save_as: "student"
        values:
          name: "Student SLPT"

      - step: "Create CRM lead"
        action: "create"
        model: "crm.lead"
        save_as: "lead"
        as_user: "base.user_admin"
        values:
          name: "Lead SLPT"
          school_id: "EVAL: registry['school'].id"
          student_id: "EVAL: registry['student'].id"

      - step: "Create wizard with payment template"
        action: "create"
        model: "crm.lead.create_admission"
        save_as: "wizard"
        values:
          lead_id: "EVAL: registry['lead'].id"
          date: "2025-07-01"
          academic_year_id: "EVAL: registry['academic_year'].id"
          academic_term_id: "EVAL: registry['academic_term'].id"
          school_id: "EVAL: registry['school'].id"
          grade_id: "EVAL: registry['grade'].id"
          student_id: "EVAL: registry['student'].id"
          payment_template_id: "EVAL: registry['payment_template'].id"

      - step: "Confirm wizard to create admission with payment compute"
        action: "call"
        target: "wizard"
        method: "action_confirm"
        as_user: "base.user_admin"

      - step: "Invalidate lead cache"
        action: "call"
        target: "lead"
        method: "invalidate_cache"

      - step: "Assert admission was created and linked to lead"
        action: "assert"
        target: "lead"
        asserts:
          admission_id:
            type: "value"
            operator: "is_truthy"

      - step: "Search for created admission"
        action: "search"
        model: "school_admission"
        domain: [["student_id", "=", "EVAL: registry['student'].id"]]
        save_as: "admission"
        expect_count: 1

      - step: "Assert admission has payment template and payment terms computed"
        action: "assert"
        target: "admission"
        asserts:
          payment_template_id:
            type: "value"
            operator: "is_truthy"
          payment_term_ids:
            type: "o2m"
            check: "count"
            expected_count: 1

  - name: "School Lead - Academic Term Default is_open_admission Filter"
    steps:
      - step: "Create academic year"
        action: "create"
        model: "school_academic_year"
        save_as: "academic_year"
        values:
          name: "2030/2031 SLDF"
          code: "AYSLDF"
          date_start: "2030-07-01"
          date_end: "2031-06-30"

      - step: "Create academic term with is_open_admission true"
        action: "create"
        model: "school_academic_term"
        save_as: "open_term"
        values:
          name: "Open Admission Term SLDF"
          code: "OATSLDF"
          date_start: "2030-07-01"
          date_end: "2031-06-30"
          year_id: "EVAL: registry['academic_year'].id"
          is_open_admission: true

      - step: "Assert term has is_open_admission true"
        action: "assert"
        target: "open_term"
        asserts:
          is_open_admission:
            type: "value"
            expected: true

      - step: "Search open admission terms by is_open_admission flag"
        action: "search"
        model: "school_academic_term"
        domain: [["code", "=", "OATSLDF"], ["is_open_admission", "=", true]]
        save_as: "result"
        expect_count: 1

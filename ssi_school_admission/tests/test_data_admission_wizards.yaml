scenarios:
  - name: "Wizard - Create Admission from Admission Form"
    steps:
      - step: "Setup - get sale journal"
        action: "search"
        model: "account.journal"
        domain: [["type", "=", "sale"]]
        save_as: "receivable_journal"
        limit: 1

      - step: "Setup - get account type ref"
        action: "ref"
        xml_id: "account.data_account_type_revenue"
        save_as: "account_type"

      - step: "Setup - create income account"
        action: "create"
        model: "account.account"
        save_as: "account"
        values:
          name: "Admission Fee Income WZFA"
          code: "WZFA4200"
          user_type_id: "EVAL: registry['account_type'].id"

      - step: "Setup - create pricelist"
        action: "create"
        model: "product.pricelist"
        save_as: "pricelist"
        values:
          name: "Pricelist WZFA"
          currency_id: "EVAL: env.company.currency_id.id"

      - step: "Setup - create grade type"
        action: "create"
        model: "school_grade_type"
        save_as: "grade_type"
        values:
          name: "Grade Type WZFA"
          code: "GTWZFA"
          sequence: 10

      - step: "Setup - create academic year"
        action: "create"
        model: "school_academic_year"
        save_as: "academic_year"
        values:
          name: "2024/2025 WZFA"
          code: "AYWZFA"
          date_start: "2024-07-01"
          date_end: "2025-06-30"

      - step: "Setup - create academic term"
        action: "create"
        model: "school_academic_term"
        save_as: "academic_term"
        values:
          name: "Semester WZFA"
          code: "SMWZFA"
          date_start: "2024-07-01"
          date_end: "2025-06-30"
          year_id: "EVAL: registry['academic_year'].id"
          enrollment_state: "open"

      - step: "Setup - create school"
        action: "create"
        model: "school"
        save_as: "school"
        values:
          name: "School WZFA"
          code: "SCHWZFA"
          grade_type_id: "EVAL: registry['grade_type'].id"

      - step: "Setup - create grade"
        action: "create"
        model: "school_grade"
        save_as: "grade"
        values:
          name: "Grade WZFA"
          code: "GWZFA"
          sequence: 10
          type_id: "EVAL: registry['grade_type'].id"

      - step: "Setup - create student contact"
        action: "create"
        model: "res.partner"
        save_as: "student_contact"
        values:
          name: "Student Contact WZFA"

      - step: "Setup - create parent contact"
        action: "create"
        model: "res.partner"
        save_as: "parent_contact"
        values:
          name: "Parent Contact WZFA"

      - step: "Create admission form"
        action: "create"
        model: "school_admission_form"
        save_as: "admission_form"
        as_user: "base.user_admin"
        values:
          date: "2024-07-01"
          academic_year_id: "EVAL: registry['academic_year'].id"
          academic_term_id: "EVAL: registry['academic_term'].id"
          school_id: "EVAL: registry['school'].id"
          grade_id: "EVAL: registry['grade'].id"
          student_id: "EVAL: registry['student_contact'].id"
          parent_id: "EVAL: registry['parent_contact'].id"
          pricelist_id: "EVAL: registry['pricelist'].id"
          currency_id: "EVAL: env.company.currency_id.id"
          journal_id: "EVAL: registry['receivable_journal'].id"
          account_id: "EVAL: registry['account'].id"

      - step: "Create wizard to create admission from form"
        action: "create"
        model: "school_admission_form.wizard_create_admission"
        save_as: "wizard"
        values:
          admission_form_id: "EVAL: registry['admission_form'].id"
          currency_id: "EVAL: env.company.currency_id.id"
          receivable_journal_id: "EVAL: registry['receivable_journal'].id"

      - step: "Call wizard action_create_admission"
        action: "call"
        target: "wizard"
        method: "action_create_admission"
        as_user: "base.user_admin"

      - step: "Search for created admission"
        action: "search"
        model: "school_admission"
        domain: [["admission_form_id", "=", "EVAL: registry['admission_form'].id"]]
        save_as: "created_admission"
        expect_count: 1

      - step: "Assert admission was created"
        action: "assert"
        target: "created_admission"
        asserts:
          id:
            type: "value"
            operator: "is_truthy"
          admission_form_id:
            type: "value"
            operator: "is_truthy"

      - step: "Call wizard again (returns existing admission)"
        action: "call"
        target: "wizard"
        method: "action_create_admission"
        as_user: "base.user_admin"

      - step: "Assert still only one admission exists"
        action: "search"
        model: "school_admission"
        domain: [["admission_form_id", "=", "EVAL: registry['admission_form'].id"]]
        save_as: "admissions_after_second_call"
        expect_count: 1


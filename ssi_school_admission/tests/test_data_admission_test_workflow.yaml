scenarios:
  - name: "Admission Test - Full Workflow Confirm Approve Open Done"
    steps:
      - step: "Setup - create grade type"
        action: "create"
        model: "school_grade_type"
        save_as: "grade_type"
        values:
          name: "Grade Type Admission Test Workflow"
          code: "GTATW"
          sequence: 10

      - step: "Setup - create academic year"
        action: "create"
        model: "school_academic_year"
        save_as: "academic_year"
        values:
          name: "2024/2025 Admission Test Workflow"
          code: "AYATW"
          date_start: "2024-07-01"
          date_end: "2025-06-30"

      - step: "Setup - create academic term"
        action: "create"
        model: "school_academic_term"
        save_as: "academic_term"
        values:
          name: "Semester Admission Test Workflow"
          code: "SMATW"
          date_start: "2024-07-01"
          date_end: "2025-06-30"
          year_id: "EVAL: registry['academic_year'].id"
          enrollment_state: "open"

      - step: "Setup - create school"
        action: "create"
        model: "school"
        save_as: "school"
        values:
          name: "School Admission Test Workflow"
          code: "SCHATW"
          grade_type_id: "EVAL: registry['grade_type'].id"

      - step: "Setup - create grade"
        action: "create"
        model: "school_grade"
        save_as: "grade"
        values:
          name: "Grade Admission Test Workflow"
          code: "GATW"
          sequence: 10
          type_id: "EVAL: registry['grade_type'].id"

      - step: "Setup - create student contact"
        action: "create"
        model: "res.partner"
        save_as: "student_contact"
        values:
          name: "Student Contact Admission Test Workflow"

      - step: "Create admission test"
        action: "create"
        model: "school_admission_test"
        save_as: "admission_test"
        values:
          date: "2024-07-01"
          academic_year_id: "EVAL: registry['academic_year'].id"
          academic_term_id: "EVAL: registry['academic_term'].id"
          school_id: "EVAL: registry['school'].id"
          grade_id: "EVAL: registry['grade'].id"
          student_id: "EVAL: registry['student_contact'].id"

      - step: "Assert admission test created in draft"
        action: "assert"
        target: "admission_test"
        asserts:
          state:
            type: "value"
            expected: "draft"

      - step: "Confirm admission test"
        action: "call"
        target: "admission_test"
        method: "action_confirm"
        as_user: "base.user_admin"
        asserts:
          state:
            type: "value"
            expected: "confirm"

      - step: "Invalidate admission test cache after confirm"
        action: "call"
        target: "admission_test"
        method: "invalidate_cache"

      - step: "Approve admission test"
        action: "call"
        target: "admission_test"
        method: "action_approve_approval"
        as_user: "base.user_admin"
        asserts:
          state:
            type: "value"
            expected: "open"

      - step: "Invalidate cache after open"
        action: "call"
        target: "admission_test"
        method: "invalidate_cache"

      - step: "Set passed to True"
        action: "write"
        target: "admission_test"
        values:
          passed: true

      - step: "Done admission test"
        action: "call"
        target: "admission_test"
        method: "action_done"
        as_user: "base.user_admin"
        asserts:
          state:
            type: "value"
            expected: "done"

      - step: "Invalidate cache after done"
        action: "call"
        target: "admission_test"
        method: "invalidate_cache"

      - step: "Assert admission test passed"
        action: "assert"
        target: "admission_test"
        asserts:
          passed:
            type: "value"
            expected: true

  - name: "Admission Test - Created Without Admission Form"

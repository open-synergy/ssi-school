scenarios:
  - name: "School Operating Unit - Master data with operating unit"
    steps:
      - step: "Get main company operating unit"
        action: "search"
        model: "operating.unit"
        domain: [["company_id", "=", "REF: base.main_company"]]
        save_as: "operating_unit"
        limit: 1

      - step: "Create grade type with operating unit"
        action: "create"
        model: "school_grade_type"
        save_as: "grade_type"
        values:
          name: "Grade Type OU Test"
          code: "GTOU01"
          sequence: 10
          operating_unit_ids:
            - - 4
              - "EVAL: registry['operating_unit'].id"

      - step: "Assert grade type has operating unit"
        action: "assert"
        target: "grade_type"
        asserts:
          operating_unit_ids:
            type: "value"
            operator: "is_truthy"

      - step: "Create school with operating unit"
        action: "create"
        model: "school"
        save_as: "school"
        values:
          name: "School OU Test"
          code: "SCHOU01"
          grade_type_id: "EVAL: registry['grade_type'].id"
          operating_unit_ids:
            - - 4
              - "EVAL: registry['operating_unit'].id"

      - step: "Assert school has operating unit"
        action: "assert"
        target: "school"
        asserts:
          operating_unit_ids:
            type: "value"
            operator: "is_truthy"

      - step: "Create grade with operating unit"
        action: "create"
        model: "school_grade"
        save_as: "grade"
        values:
          name: "Grade OU Test"
          code: "GOU01"
          sequence: 10
          type_id: "EVAL: registry['grade_type'].id"
          operating_unit_ids:
            - - 4
              - "EVAL: registry['operating_unit'].id"

      - step: "Assert grade has operating unit"
        action: "assert"
        target: "grade"
        asserts:
          operating_unit_ids:
            type: "value"
            operator: "is_truthy"

      - step: "Create grade class with operating unit"
        action: "create"
        model: "school_grade_class"
        save_as: "grade_class"
        values:
          name: "Grade Class OU Test"
          code: "GCOU01"
          school_id: "EVAL: registry['school'].id"
          grade_id: "EVAL: registry['grade'].id"
          operating_unit_ids:
            - - 4
              - "EVAL: registry['operating_unit'].id"

      - step: "Assert grade class has operating unit"
        action: "assert"
        target: "grade_class"
        asserts:
          operating_unit_ids:
            type: "value"
            operator: "is_truthy"

      - step: "Create academic year with operating unit"
        action: "create"
        model: "school_academic_year"
        save_as: "academic_year"
        values:
          name: "2025/2026 OU Test"
          code: "AYOU01"
          date_start: "2025-07-01"
          date_end: "2026-06-30"
          operating_unit_ids:
            - - 4
              - "EVAL: registry['operating_unit'].id"

      - step: "Assert academic year has operating unit"
        action: "assert"
        target: "academic_year"
        asserts:
          operating_unit_ids:
            type: "value"
            operator: "is_truthy"

      - step: "Create academic term with operating unit"
        action: "create"
        model: "school_academic_term"
        save_as: "academic_term"
        values:
          name: "Semester 1 OU Test"
          code: "SMOU01"
          date_start: "2025-07-01"
          date_end: "2025-12-31"
          year_id: "EVAL: registry['academic_year'].id"
          enrollment_state: "open"
          operating_unit_ids:
            - - 4
              - "EVAL: registry['operating_unit'].id"

      - step: "Assert academic term has operating unit"
        action: "assert"
        target: "academic_term"
        asserts:
          operating_unit_ids:
            type: "value"
            operator: "is_truthy"

  - name: "School Operating Unit - Student and Teacher with operating unit"
    steps:
      - step: "Get main company operating unit"
        action: "search"
        model: "operating.unit"
        domain: [["company_id", "=", "REF: base.main_company"]]
        save_as: "operating_unit"
        limit: 1

      - step: "Create grade type"
        action: "create"
        model: "school_grade_type"
        save_as: "grade_type"
        values:
          name: "Grade Type OU Student Teacher"
          code: "GTOU02"
          sequence: 10

      - step: "Create school"
        action: "create"
        model: "school"
        save_as: "school"
        values:
          name: "School OU Student Teacher"
          code: "SCHOU02"
          grade_type_id: "EVAL: registry['grade_type'].id"

      - step: "Create student contact"
        action: "create"
        model: "res.partner"
        save_as: "student_contact"
        values:
          name: "Student Contact OU Test"

      - step: "Create school student with operating unit"
        action: "create"
        model: "school_student"
        save_as: "student"
        values:
          name: "Student OU Test"
          code: "STOU02"
          contact_id: "EVAL: registry['student_contact'].id"
          school_id: "EVAL: registry['school'].id"
          operating_unit_ids:
            - - 4
              - "EVAL: registry['operating_unit'].id"

      - step: "Assert student has operating unit"
        action: "assert"
        target: "student"
        asserts:
          operating_unit_ids:
            type: "value"
            operator: "is_truthy"

      - step: "Create teacher contact"
        action: "create"
        model: "res.partner"
        save_as: "teacher_contact"
        values:
          name: "Teacher Contact OU Test"

      - step: "Create school teacher with operating unit"
        action: "create"
        model: "school_teacher"
        save_as: "teacher"
        values:
          name: "Teacher OU Test"
          code: "TCHOU02"
          contact_id: "EVAL: registry['teacher_contact'].id"
          operating_unit_ids:
            - - 4
              - "EVAL: registry['operating_unit'].id"

      - step: "Assert teacher has operating unit"
        action: "assert"
        target: "teacher"
        asserts:
          operating_unit_ids:
            type: "value"
            operator: "is_truthy"

  - name: "School Operating Unit - Enrollment with operating unit"
    steps:
      - step: "Get main company operating unit"
        action: "search"
        model: "operating.unit"
        domain: [["company_id", "=", "REF: base.main_company"]]
        save_as: "operating_unit"
        limit: 1

      - step: "Create grade type"
        action: "create"
        model: "school_grade_type"
        save_as: "grade_type"
        values:
          name: "Grade Type Enrollment OU"
          code: "GTOU03"
          sequence: 10

      - step: "Create school"
        action: "create"
        model: "school"
        save_as: "school"
        values:
          name: "School Enrollment OU Test"
          code: "SCHOU03"
          grade_type_id: "EVAL: registry['grade_type'].id"

      - step: "Create grade"
        action: "create"
        model: "school_grade"
        save_as: "grade"
        values:
          name: "Grade Enrollment OU"
          code: "GOU03"
          sequence: 10
          type_id: "EVAL: registry['grade_type'].id"

      - step: "Create academic year"
        action: "create"
        model: "school_academic_year"
        save_as: "academic_year"
        values:
          name: "2025/2026 Enrollment OU"
          code: "AYOU03"
          date_start: "2025-07-01"
          date_end: "2026-06-30"

      - step: "Create academic term"
        action: "create"
        model: "school_academic_term"
        save_as: "academic_term"
        values:
          name: "Semester 1 Enrollment OU"
          code: "SMOU03"
          date_start: "2025-07-01"
          date_end: "2025-12-31"
          year_id: "EVAL: registry['academic_year'].id"
          enrollment_state: "open"

      - step: "Create student contact"
        action: "create"
        model: "res.partner"
        save_as: "student_contact"
        values:
          name: "Student Enrollment OU Test"

      - step: "Create school student"
        action: "create"
        model: "school_student"
        save_as: "student"
        values:
          name: "Student Enrollment OU"
          code: "STOU03"
          contact_id: "EVAL: registry['student_contact'].id"
          school_id: "EVAL: registry['school'].id"

      - step: "Create grade class for enrollment"
        action: "create"
        model: "school_grade_class"
        save_as: "grade_class"
        values:
          name: "Grade Class Enrollment OU"
          code: "GCOU03"
          school_id: "EVAL: registry['school'].id"
          grade_id: "EVAL: registry['grade'].id"

      - step: "Create enrollment with operating unit"
        action: "create"
        model: "school_enrollment"
        save_as: "enrollment"
        as_user: "base.user_admin"
        values:
          date: "2025-07-15"
          academic_year_id: "EVAL: registry['academic_year'].id"
          academic_term_id: "EVAL: registry['academic_term'].id"
          school_id: "EVAL: registry['school'].id"
          grade_id: "EVAL: registry['grade'].id"
          grade_class_id: "EVAL: registry['grade_class'].id"
          student_id: "EVAL: registry['student'].id"
          operating_unit_id: "EVAL: registry['operating_unit'].id"

      - step: "Assert enrollment has operating unit"
        action: "assert"
        target: "enrollment"
        asserts:
          state:
            type: "value"
            expected: "draft"
          operating_unit_id:
            type: "value"
            operator: "is_truthy"
